<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SabayHOST</title>
    <link rel="stylesheet" href="login.css" />
    <!-- Basic Icons -->
    <link
      href="https://cdn.boxicons.com/3.0.8/fonts/basic/boxicons.min.css"
      rel="stylesheet"
    />
    <!-- Filled Icons -->
    <link
      href="https://cdn.boxicons.com/3 .0.8/fonts/filled/boxicons-filled.min.css"
      rel="stylesheet"
    />
    <!-- Brand Icons -->
    <link
      href="https://cdn.boxicons.com/3.0.8/fonts/brands/boxicons-brands.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="login.css" />
        <link rel="icon" href="image/LogoSabayHost.png">

  </head>

  <body>
    <div class="container10">
      <div class="form-box login">
        <form action="">
          <h1>Login</h1>
          <div class="input-box">
            <input type="text" placeholder="Username" required />
            <i class="bxf bx-user"></i>
          </div>
          <div class="input-box">
            <input type="password" placeholder="Password" required />
            <i class="bxf bx-lock"></i>
          </div>
          <div class="forgot-link">
            <a Forgot href="#">Forgot Password?</a>
          </div>
          <button type="submit" class="btn">Login</button>
          <p>or login with social platforms</p>
          <div class="social-icons">
            <a href="#"><i class="bxl bx-facebook-circle"></i></a>
            <a href="#"><i class="bxl bx-google"></i></a>
            <a href="#"><i class="bxl bx-github"></i></a>
            <a href="#"><i class="bxl bx-telegram"></i></a>
          </div>
        </form>
      </div>
      <div class="form-box register">
        <form action="">
          <h1>Registration</h1>
          <div class="input-box">
            <input type="text" placeholder="Username" required />
            <i class="bxf bx-user"></i>
          </div>
          <div class="input-box">
            <input type="email" placeholder="Email" required />
            <i class="bxf bx-envelope"></i>
          </div>
          <div class="input-box">
            <input type="password" placeholder="Password" required />
            <i class="bxf bx-lock"></i>
          </div>
          <div class="forgot-link">
            <a Forgot href="#">Forgot Password?</a>
          </div>
          <button type="submit" class="btn">Register</button>
          <p>or register with social platforms</p>
          <div class="social-icons">
            <a href="#"><i class="bxl bx-facebook-circle"></i></a>
            <a href="#"><i class="bxl bx-google"></i></a>
            <a href="#"><i class="bxl bx-github"></i></a>
            <a href="#"><i class="bxl bx-telegram"></i></a>
          </div>
        </form>
      </div>

      <div class="toggle-box">
        <div class="toggle-panel toggle-left">
          <h1>Welcome Back!</h1>
          <p>Don't have an account?</p>
          <button class="btn register-btn">Register</button>
        </div>
        <div class="toggle-panel toggle-right">
          <h1>Welcome Back!</h1>
          <p>Already have an account?</p>
          <button class="btn login-btn">Login</button><a >
        </div>
      </div>
    </div>

    <a class="backHome" href="index.html">Back Home</a>
    <script src="script.js"></script>
  </body>
</html>
